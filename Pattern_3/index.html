<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Stack elements with Grid</title>
</head>
<body>
 
    <!-- Stack Elements with Grid Pattern -->
    <!-- Məqsəd: iki elementi üst-üstə yığmaq (position: absolute olmadan) -->
 
    <!-- Wrapper: grid container rolunu oynayır -->
    <div class="wrapper">
 
        <!-- item1: altda qalan element -->
        <div class="item1">
            item1
        </div>
 
        <!-- item2: üstdə qalan element (DOM-da sonra gəldiyi üçün üstdədir) -->
        <div class="item2">
            item2
        </div>
 
    </div>
 
</body>
</html>
